# Waterfront Kayak Rental MQTT Broker - Secure Config (username/password + TLS)
# For ESP32 controllers, Next.js backend, admin dashboard

# Global settings (apply to all listeners unless overridden)
allow_anonymous false
password_file /mosquitto/config/passwd

# Persistence (important for retained status messages from ESP32)
persistence true
persistence_location /mosquitto/data/
persistence_file mosquitto.db
autosave_interval 1800

# Logging
log_dest stdout
log_dest file /mosquitto/log/mosquitto.log
log_type all
log_timestamp true

# Plain MQTT (for local testing / fallback - disable in prod if not needed)
listener 1883
protocol mqtt

# Secure MQTT (MQTTS) - main for ESP32 in production
listener 8883
protocol mqtt
cafile /mosquitto/config/certs/ca.crt
certfile /mosquitto/config/certs/server.crt
keyfile /mosquitto/config/certs/server.key
require_certificate false          # set true only if you want client cert auth (mTLS)

# Secure WebSockets (wss://) - useful for browser-based admin dashboard or PWA
listener 9001
protocol websockets
cafile /mosquitto/config/certs/ca.crt
certfile /mosquitto/config/certs/server.crt
keyfile /mosquitto/config/certs/server.key
require_certificate false