; platformio.ini for WATERFRONT ESP32 Kayak Rental Controller
; Base: inspired by nodestark/mdb-esp32-cashless (but MDB mostly removed)

[platformio]
default_envs = esp32dev          ; change to esp32s3 when you have S3 board

[env:esp32dev]
platform = espressif32
board = esp32dev                 ; classic ESP32 DevKit / NodeMCU-32S
framework = espidf               ; ESP-IDF (needed for provisioning + advanced features)
monitor_speed = 115200
upload_speed = 921600

lib_deps =
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^6.21.4
    vshymanskyy/TinyGSM@^0.12.0   ; for future LTE failover (SIM7600 etc.)

build_flags =
    ; Remove or comment these lines - they cause the redefinition error in wpa_supplicant
    ; -D CORE_DEBUG_LEVEL=4
    ; -D CONFIG_LOG_DEFAULT_LEVEL=4

; Optional: keep verbose logging via sdkconfig.defaults instead (safer)

; Optional: variant for ESP32-S3 (uncomment when you have the board)
;[env:esp32s3]
;platform = espressif32
;board = esp32-s3-devkitc-1-n8r8  ; or esp32-s3-devkitc-1 depending on exact variant
;framework = espidf
;monitor_speed = 115200
; same lib_deps & build_flags as above