; =============================================
; Waterfront ESP32 Kayak/SUP Rental Controller
; PlatformIO Configuration (ESP-IDF framework)
; Best practices 2026: secure, OTA-ready, low-power
; Migrated from Arduino for production features
; =============================================

[platformio]
description = Waterfront ESP32 MQTT Gate Controller (Kayak Rental IoT)
default_envs = esp32-s3-dev  ; Default to S3; change to esp32-dev for classic ESP32

; ====================
; Common settings (inherited by all envs)
; ====================
[common]
platform = espressif32@6.7.0  ; Latest stable for ESP-IDF v5.x (2026 compat)
framework = espidf            ; Switch from Arduino for native low-power/TLS/OTA
board_build.partitions = partitions.csv  ; Custom OTA + LittleFS (create this file!)
board_build.filesystem = littlefs        ; For config.json, certs, etc.
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, default  ; Better crash decoding
upload_speed = 921600                            ; Faster USB upload
build_type = debug                               ; Default; override in envs

; Libs: Use ESP-IDF natives where possible; keep TinyGSM for LTE
lib_deps =
    espressif/esp-mqtt@^2.0.0                    ; Native MQTT with TLS
    nlohmann/json@^3.11.3                        ; Modern JSON (replaces ArduinoJson)
    h2zero/esp-nimble@^1.4.2                     ; Native NimBLE for BLE (replaces NimBLE-Arduino)
    vshymanskyy/TinyGSM@^0.12.0                  ; LTE cellular fallback (if hardware added)
    ; Add sensor-specific: e.g., adafruit/Adafruit Unified Sensor for ultrasonics
    catchorg/Catch2@^2.13.10                     ; For unit tests

; Build flags (global): Align with ESP-IDF best practices
build_flags =
    -D CORE_DEBUG_LEVEL=4                        ; Verbose logging (match your original)
    -D CONFIG_LOG_DEFAULT_LEVEL=3                ; ESP-IDF log level (INFO)
    -D CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240       ; Max perf when awake (S3-specific)
    -D CONFIG_LWIP_MAX_SOCKETS=10                ; For MQTT + HTTP OTA
    -D OTA_ENABLED=1                             ; Prep for OTA in code
    -Wno-unused-variable -Wno-unused-function    ; Clean warnings
    ; Add -DCONFIG_SECURE_BOOT_ENABLED=1 later for secure boot

; Extra scripts: Optional for custom pre/post (e.g., embed certs)
; extra_scripts = pre:embed_certs.py

; ====================
; Environments
; ====================

; Development / Debug (default for S3)
[env:esp32-s3-dev]
extends = common
board = esp32-s3-devkitc-1                    ; Or your S3 variant (e.g., -n8r8 for 8MB PSRAM)
board_build.flash_mode = dio
build_type = debug
build_flags =
    ${common.build_flags}
    -DDEBUG=1
    -DCONFIG_COMPILER_OPTIMIZATION_DEFAULT=0  ; No opt for debugging

; Classic ESP32 variant (for compatibility/testing)
[env:esp32-dev]
extends = common
board = esp32dev                              ; Your original (NodeMCU-32S/DevKit)
build_flags =
    ${common.build_flags}
    -DDEBUG=1
    -DCONFIG_ESP32_DEFAULT_CPU_FREQ_240       ; Adjust for non-S3

; Production / Release (optimized, smaller binary for low-power)
[env:esp32-s3-prod]
extends = common
board = esp32-s3-devkitc-1
build_type = release
build_flags =
    ${common.build_flags}
    -Os                                       ; Size optimization
    -DCONFIG_COMPILER_OPTIMIZATION_SIZE=1
    -D NDEBUG                                 ; Disable asserts for prod

; OTA-focused environment (for testing wireless updates)
[env:esp32-s3-ota]
extends = common
board = esp32-s3-devkitc-1
upload_protocol = espota                      ; Native ESP-IDF OTA
upload_port = waterfront-esp32.local          ; Or IP: 192.168.x.x (use mDNS if enabled)
upload_flags =
    --port=3232                               ; Default OTA port
    --auth=your_ota_password_here             ; Set in code (e.g., esp_ota_set_password)
build_flags =
    ${common.build_flags}

; Unit Testing (native, keep your original)
[env:unit_test]
platform = native
lib_deps = catchorg/Catch2@^2.13.10           ; Keep v2 for compatibility
test_filter = *

; ====================
; Custom partition table (save as partitions.csv in waterfront-esp32/)
; # Name,   Type, SubType, Offset,  Size, Flags
; nvs,      data, nvs,     0x9000,  0x6000,
; phy_init, data, phy,     0xf000,  0x1000,
; factory,  app,  factory, 0x10000, 1.9M,   ; Main app (before OTA)
; ota_0,    app,  ota_0,   ,        1.9M,
; ota_1,    app,  ota_1,   ,        1.9M,
; littlefs, data, littlefs, ,        0.5M,   ; Config/certs (adjust sizes for your flash)
