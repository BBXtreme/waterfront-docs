; platformio.ini – Waterfront ESP32 Kayak Controller (Arduino framework)

[platformio]
default_envs = esp32dev

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
board_build.partitions = default_16MB.csv       ; optional – good for LittleFS later
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
upload_speed = 921600

; === Libraries (core ones from TSD + common needs) ===
lib_deps = 
    knolleary/PubSubClient@^2.8                 ; MQTT client
    bblanchon/ArduinoJson@^7.0.4                ; JSON handling (updated 2026 stable)
    vshymanskyy/TinyGSM@^0.12.0                 ; LTE modem (SIM7600/SIM7000 etc.)
    ; esp_wifi_prov (built-in via espressif32 platform – no extra lib needed)
    ; NimBLE-Arduino@^1.4.1                     ; uncomment later for BLE provisioning

; === Build flags ===
build_flags = 
    -D CORE_DEBUG_LEVEL=4                       ; more verbose serial output
    -D CONFIG_ARDUINO_ESP32_SPI_AUTOINIT=1      ; safer SPI init
    -D ARDUINO_JSON_ENABLE_STD_STRING=1         ; better Json compatibility

; === Optional: enable when adding BLE provisioning ===
; lib_deps += h2zero/NimBLE-Arduino@^1.4.1

; === Optional: for unit tests later ===
; test_ignore = test_desktop   ; if you add Catch2 later